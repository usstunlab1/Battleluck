## BattleLuck BepInEx feature switches.
## Detailed event definitions, action catalog entries, prompts, and AI credentials
## remain under BepInEx/config/BattleLuck/.

[Events]

## Enable declarative BattleLuck events and game modes.
Enabled = true

## Comma-separated event IDs to load, or * for every enabled event bundle.
## Example: bloodbath,siege,trials,colosseum,aievent
EnabledModes = *

[Actions]

## Allow catalog-backed event, command, and AI actions to mutate game state.
Enabled = true

[AI]

## Master AI switch. ai_config.json must also have "enabled": true.
Enabled = true

## Provider override: config, auto, local, llama, cloudflare, or google.
Provider = config

## Allow approval-gated AI event creation and editing.
EventAuthoringEnabled = true

## Permit automatic ProjectM AI-group NPC actions. False is recommended.
AutoExecuteNpcActions = false
