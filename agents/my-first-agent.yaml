name: My First Agent
version: 0.0.1
schema: v1
models:
  - name: Relace Instant Apply
    provider: relace
    model: Fast-Apply
    apiKey: ${{ secrets.RELACE_API_KEY }}
    roles:
      - apply
    promptTemplates:
      apply: "{{{ new_code }}}"
    defaultCompletionOptions:
      contextLength: 40000
      maxTokens: 32000
  - name: Claude 4 Sonnet
    provider: anthropic
    model: claude-sonnet-4-20250514
    apiKey: ${{ secrets.ANTHROPIC_API_KEY }}
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      contextLength: 200000
      maxTokens: 64000
    capabilities:
      - tool_use
      - image_input
  - name: Mercury Coder
    provider: inception
    model: mercury-coder
    apiKey: ${{ secrets.INCEPTION_API_KEY }}
    roles:
      - autocomplete
    capabilities:
      - next_edit
    defaultCompletionOptions:
      temperature: 0
      stop:
        - <|endoftext|>
        - <|/code_to_edit|>
    promptTemplates:
      apply: |-
        <|original_code|>
        {{{ original_code }}}
        <|/original_code|>

        <|update_snippet|>
        {{{ new_code }}}
        <|/update_snippet|>
mcpServers:
  - name: Context7 MCP
    type: streamable-http
    url: https://mcp.context7.com/mcp
context:
  - provider: diff
  - provider: terminal
  - provider: file
